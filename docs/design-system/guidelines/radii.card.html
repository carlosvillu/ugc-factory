<!-- @dsCard group="Spacing" viewport="700x180" name="Corner radii" subtitle="sm 5 · md 7 · lg 10 · xl 14 · full" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:20px;display:flex;gap:16px;}
  .box{width:64px;height:64px;background:var(--surface-3);border:1px solid var(--border-2);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;}
  .lbl{font-size:10px;font-family:var(--font-mono);color:var(--text-2);}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px;}
</style>
</head>
<body>
  <div class="col"><div class="box" style="border-radius:var(--r-sm);"></div><span class="lbl">r-sm · 5</span></div>
  <div class="col"><div class="box" style="border-radius:var(--r-md);"></div><span class="lbl">r-md · 7</span></div>
  <div class="col"><div class="box" style="border-radius:var(--r-lg);"></div><span class="lbl">r-lg · 10</span></div>
  <div class="col"><div class="box" style="border-radius:var(--r-xl);"></div><span class="lbl">r-xl · 14</span></div>
  <div class="col"><div class="box" style="border-radius:var(--r-full);"></div><span class="lbl">r-full</span></div>
</body>
</html>
