<!-- @dsCard group="Colors" viewport="700x150" name="Semantic status" subtitle="fixed across theme & accent: success / warning / danger / info" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:18px;}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .card{border:1px solid var(--border);border-radius:var(--r-md);padding:12px;background:var(--surface);display:flex;align-items:center;gap:10px;}
  .sw{width:26px;height:26px;border-radius:7px;flex-shrink:0;}
  .name{font-size:12px;font-weight:600;color:var(--text);}
  .hex{font-size:11px;color:var(--text-3);font-family:var(--font-mono);}
</style>
</head>
<body>
  <div class="row">
    <div class="card"><span class="sw" style="background:var(--success);"></span><div><div class="name">Success</div><div class="hex">#22c55e</div></div></div>
    <div class="card"><span class="sw" style="background:var(--warning);"></span><div><div class="name">Warning</div><div class="hex">#f59e0b</div></div></div>
    <div class="card"><span class="sw" style="background:var(--danger);"></span><div><div class="name">Danger</div><div class="hex">#ef4444</div></div></div>
    <div class="card"><span class="sw" style="background:var(--info);"></span><div><div class="name">Info</div><div class="hex">#3b82f6</div></div></div>
  </div>
</body>
</html>
