<!-- @dsCard group="Type" viewport="700x180" name="Type families" subtitle="Geist (UI) vs Geist Mono (data/code/cost)" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:18px;}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .card{border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;background:var(--surface);}
  .tag{font-size:10px;color:var(--text-3);font-family:var(--font-mono);margin-bottom:6px;}
  .big{font-size:32px;font-weight:600;letter-spacing:-0.02em;color:var(--text);}
  .sample{font-size:12px;color:var(--text-2);margin-top:6px;}
</style>
</head>
<body>
  <div class="row">
    <div class="card"><div class="tag">--font-sans</div><div class="big">Geist</div><div class="sample">Canvas del pipeline · Aprobar y continuar</div></div>
    <div class="card"><div class="tag">--font-mono</div><div class="big" style="font-family:var(--font-mono);font-weight:500;">Geist Mono</div><div class="sample" style="font-family:var(--font-mono);">$1.82 · req_a9f2 · −14 LUFS</div></div>
  </div>
</body>
</html>
