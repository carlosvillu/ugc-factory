<!-- @dsCard group="Spacing" viewport="700x220" name="Spacing scale" subtitle="Base 4px — xs/sm/md/lg/xl/2xl" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:20px;}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
  .bar{height:16px;background:var(--accent);border-radius:2px;}
  .lbl{font-size:12px;font-family:var(--font-mono);color:var(--text-2);}
</style>
</head>
<body>
  <div class="row"><span class="bar" style="width:4px;"></span><span class="lbl">--space-xs · 4px</span></div>
  <div class="row"><span class="bar" style="width:8px;"></span><span class="lbl">--space-sm · 8px</span></div>
  <div class="row"><span class="bar" style="width:12px;"></span><span class="lbl">--space-md · 12px</span></div>
  <div class="row"><span class="bar" style="width:16px;"></span><span class="lbl">--space-lg · 16px</span></div>
  <div class="row"><span class="bar" style="width:24px;"></span><span class="lbl">--space-xl · 24px</span></div>
  <div class="row"><span class="bar" style="width:32px;"></span><span class="lbl">--space-2xl · 32px</span></div>
</body>
</html>
