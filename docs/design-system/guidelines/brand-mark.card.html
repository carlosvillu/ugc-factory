<!-- @dsCard group="Brand" viewport="700x140" name="Wordmark placeholder" subtitle="No logo supplied — plain type + accent square mark" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface);font-family:var(--font-sans);padding:24px;display:flex;align-items:center;gap:12px;}
  .mark{width:30px;height:30px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);}
  .dot{width:11px;height:11px;border-radius:3px;background:#fff;}
  .name{font-size:15px;font-weight:600;letter-spacing:-0.01em;color:var(--text);}
  .sub{font-size:11px;color:var(--text-3);font-family:var(--font-mono);}
</style>
</head>
<body>
  <div class="mark"><div class="dot"></div></div>
  <div><div class="name">UGC Factory</div><div class="sub">no brand mark supplied — placeholder only</div></div>
</body>
</html>
