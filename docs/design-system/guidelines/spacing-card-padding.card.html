<!-- @dsCard group="Spacing" viewport="700x180" name="Card padding & rhythm in use" subtitle="22–26px card padding, 48px section rhythm" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:18px;}
  .card{border:1px solid var(--border);border-radius:var(--r-lg);background:var(--surface);padding:22px;box-shadow:var(--shadow-sm);}
  .title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;}
  .desc{font-size:12px;color:var(--text-2);}
</style>
</head>
<body>
  <div class="card">
    <div class="title">Panel de gasto</div>
    <div class="desc">22px de padding interno; radio --r-lg (10px); borde 1px --border; sombra --shadow-sm en reposo.</div>
  </div>
</body>
</html>
